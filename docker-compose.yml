version: '3.8'

services:
  service-a:
    build: ./service-a
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  service-b:
    build: ./service-b
    depends_on:
      service-a:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - SERVICE_A_URL=http://service-a:5000
    restart: unless-stopped
