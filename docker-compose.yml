version: '3'

services:
  service-a:
    build: ./service-a
    ports:
      - "5000:5000"
    environment:
      - DB_PASSWORD=admin1234
      - SECRET_KEY=supersecret123

  service-b:
    build: ./service-b
    depends_on:
      - service-a
    environment:
      - SERVICE_A_URL=http://localhost:5000
